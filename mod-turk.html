<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mod</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

/* TOP BAR (درست شده) */
.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;

    padding:20px 25px;
    background:#141414;
    border-bottom:1px solid #2a2a2a;
}

/* LEFT */
.left{
    display:flex;
    align-items:center;
    gap:15px;
}

.icon{
    width:85px;
    height:85px;
    background:#222;
    border-radius:10px;
}

/* CENTER TEXT */
.titleBox h2{
    margin:0;
}

/* DOWNLOAD */
.download{
    display:inline-block;
    margin-top:8px;
    padding:10px 16px;
    background:#2ecc71;
    color:black;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

/* RIGHT (LIKE + DISLIKE + VIEW) */
.right{
    display:flex;
    align-items:center;
    gap:15px;
}

.btn{
    cursor:pointer;
    font-size:18px;
}

.stats{
    font-size:14px;
    opacity:0.8;
}

/* CONTENT */
.content{
    padding:25px;
}

/* TAB BUTTONS */
.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tabBtn{
    padding:8px 12px;
    background:#1e1e1e;
    border-radius:6px;
    cursor:pointer;
}

.tabBtn.active{
    background:#2ecc71;
    color:black;
}

/* TAB CONTENT */
.tab{
    display:none;
}

.tab.active{
    display:block;
}

/* BOX */
.box{
    background:#111;
    padding:15px;
    border-radius:10px;
    border:1px solid #1f1f1f;
}
</style>

<script>
let likes=0;
let dislikes=0;
let liked=false;
let disliked=false;
let views=0;

function load(){
    views++;
    document.getElementById("views").innerText=views;
    document.getElementById("likes").innerText=likes;
    document.getElementById("dislikes").innerText=dislikes;
}

function like(){
    if(liked){likes--;liked=false;}
    else{
        likes++;liked=true;
        if(disliked){dislikes--;disliked=false;}
    }
    load();
}

function dislike(){
    if(disliked){dislikes--;disliked=false;}
    else{
        dislikes++;disliked=true;
        if(liked){likes--;liked=false;}
    }
    load();
}

function showTab(id){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tabBtn").forEach(b=>b.classList.remove("active"));

    document.getElementById(id).classList.add("active");
    event.target.classList.add("active");
}

window.onload=load;
</script>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

    <!-- LEFT -->
    <div class="left">
        <div class="icon"></div>

        <div class="titleBox">
            <h2 id="name">Turkish Formable Civilizations</h2>
            <a class="download" href="files/Turkish Formable Civilizations.zip">Download</a>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="btn" onclick="like()">👍 <span id="likes">0</span></div>
        <div class="btn" onclick="dislike()">👎 <span id="dislikes">0</span></div>
        <div class="stats">👁 <span id="views">0</span></div>
    </div>

</div>

<!-- CONTENT -->
<div class="content">

<div class="tabs">
    <div class="tabBtn active" onclick="showTab('description')">Descriptions</div>
    <div class="tabBtn" onclick="showTab('images')">Images</div>
    <div class="tabBtn" onclick="showTab('videos')">Videos</div>
    <div class="tabBtn" onclick="showTab('comments')">Comments</div>
</div>

<div id="description" class="tab active">
    <h3>Description</h3>
    <p>This is mod description goes here...</p>
</div>

<div id="images" class="tab">
    <div class="box">Images here</div>
</div>

<div id="comments" class="tab">
    <div class="box">Comments here</div>
</div>

    <div id="videos" class="tab">
    <div class="box">No videos yet</div>
</div>
    
</div>

</body>
</html>
