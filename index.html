<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iliya Mods</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

/* هدر */
.header {
    text-align: center;
    padding: 60px 20px;
    animation: drop 1s ease;
}

@keyframes drop {
    from {opacity:0; transform: translateY(-50px);}
    to {opacity:1; transform: translateY(0);}
}

.searchBox {
    margin-top: 20px;
}

input {
    padding: 10px;
    width: 250px;
    border-radius: 8px;
    border: none;
}

.modsBtn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 20px;
    background: green;
    color: white;
    text-decoration: none;
    border-radius: 8px;
}

.modsBtn:hover {
    box-shadow: 0 0 15px lime;
}
</style>

<script>
function searchMods() {
    let val = document.getElementById("search").value.toLowerCase();
    if(val.includes("iran")) {
        window.location.href = "mod-iran.html";
    }
    else if(val.includes("turk")) {
        window.location.href = "mod-turk.html";
    }
    else if(val.includes("iliya")) {
        window.location.href = "mod-iliya.html";
    }
    else {
        alert("No mod found");
    }
}
</script>

</head>

<body>

<div class="header">
    <h1>Welcome to Iliya Mods</h1>

    <p>AoH3 custom mods collection</p>

    <div class="searchBox">
        <input id="search" placeholder="Search mods...">
        <button onclick="searchMods()">Search</button>
    </div>

    <a class="modsBtn" href="mods.html">Browse All Mods</a>
</div>

</body>
</html>
