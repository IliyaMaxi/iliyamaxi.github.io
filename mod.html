<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mod</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

.tabs{
    display:flex;
    gap:10px;
    padding:12px;
    background:#141414;
    border-bottom:1px solid #2a2a2a;
}

.tab{
    padding:8px 12px;
    cursor:pointer;
    border-radius:6px;
}

.tab:hover{background:#2a2a2a;}

.tab.active{background:#2ecc71;color:black;font-weight:bold;}

.section{
    display:none;
    padding:25px;
    animation: fade 0.3s ease;
}

.section.active{display:block;}

@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.main{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    align-items:center;
}

.icon{
    width:90px;
    height:90px;
    background:#1e1e1e;
    border-radius:10px;
}

.download{
    display:inline-block;
    margin-top:10px;
    padding:10px 16px;
    background:#2ecc71;
    color:black;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.btn{
    margin-top:10px;
    display:flex;
    gap:10px;
}

.btn div{
    padding:6px 10px;
    background:#222;
    border-radius:6px;
    cursor:pointer;
}

.box{
    background:#111;
    padding:15px;
    border-radius:10px;
    border:1px solid #1f1f1f;
}
</style>

<script>
const mods = {
    iliya:{
        name:"Iliya's AoH3 Mod",
        desc:"Advanced AoH3 mod with new systems and civilizations.",
        file:"files/iliya.zip"
    },
    iran:{
        name:"Iran Formable 2",
        desc:"Iran civilizations expansion mod.",
        file:"files/iran.zip"
    },
    turk:{
        name:"Turkish Formable",
        desc:"Turkish expansion and formable nations.",
        file:"files/turk.zip"
    }
};

function getMod(){
    const url = new URLSearchParams(window.location.search);
    return url.get("mod") || "iliya";
}

function loadMod(){
    const mod = mods[getMod()];

    document.getElementById("title").innerText = mod.name;
    document.getElementById("desc").innerText = mod.desc;
    document.getElementById("download").href = mod.file;
}

function showTab(id){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

    document.getElementById(id).classList.add("active");
    event.target.classList.add("active");
}

window.onload = loadMod;
</script>

</head>

<body>

<div class="tabs">
    <div class="tab active" onclick="showTab('overview')">Overview</div>
    <div class="tab" onclick="showTab('images')">Images</div>
    <div class="tab" onclick="showTab('videos')">Videos</div>
    <div class="tab" onclick="showTab('comments')">Comments</div>
</div>

<div id="overview" class="section active">

    <div class="main">

        <div class="icon"></div>

        <div>
            <h1 id="title"></h1>
            <p id="desc"></p>

            <a id="download" class="download">Download</a>

            <div class="btn">
                <div>👍 Like</div>
                <div>👎 Dislike</div>
            </div>
        </div>

    </div>

</div>

<div id="images" class="section">
    <div class="box">No images yet</div>
</div>

<div id="videos" class="section">
    <div class="box">No videos yet</div>
</div>

<div id="comments" class="section">
    <div class="box">No comments yet</div>
</div>

</body>
</html>
