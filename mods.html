<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mod Page</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

/* Tabs */
.tabs{
    display:flex;
    gap:15px;
    padding:12px;
    background:#1a1a1a;
    border-bottom:1px solid #333;
}

.tab{
    cursor:pointer;
    padding:8px 12px;
    border-radius:6px;
}

.tab:hover{
    background:#2a2a2a;
}

/* Main layout */
.main{
    display:flex;
    gap:20px;
    padding:25px;
    flex-wrap:wrap;
    align-items:center;
}

/* icon */
.icon{
    width:110px;
    height:110px;
    background:#222;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* text */
.info{
    max-width:450px;
}

.download{
    display:inline-block;
    margin-top:12px;
    padding:10px 16px;
    background:green;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

/* like/dislike */
.reactions{
    margin-top:15px;
    display:flex;
    gap:10px;
}

.btn{
    padding:6px 10px;
    background:#222;
    border-radius:6px;
    cursor:pointer;
}

.btn:hover{
    background:#333;
}

/* sections */
.section{
    display:none;
    padding:20px;
    background:#111;
}

.section.active{
    display:block;
}
</style>

<script>
function showTab(tab){

    let sections = document.getElementsByClassName("section");

    for(let i=0;i<sections.length;i++){
        sections[i].classList.remove("active");
    }

    document.getElementById(tab).classList.add("active");
}
</script>

</head>

<body>

<!-- Tabs -->
<div class="tabs">
    <div class="tab" onclick="showTab('overview')">Overview</div>
    <div class="tab" onclick="showTab('images')">Images</div>
    <div class="tab" onclick="showTab('videos')">Videos</div>
    <div class="tab" onclick="showTab('comments')">Comments</div>
</div>

<!-- Overview (پیش‌فرض، بدون کلیک هم نمایش داده میشه) -->
<div id="overview" class="section active">

    <div class="main">

        <div class="icon">ICON</div>

        <div class="info">
            <h1>Mod Name</h1>

            <p>
                Custom AoH3 mod with new civilizations,
                gameplay improvements and balance updates.
            </p>

            <a class="download" href="files/mod.zip">Download</a>

            <div class="reactions">
                <div class="btn">👍 Like</div>
                <div class="btn">👎 Dislike</div>
            </div>

        </div>

    </div>

</div>

<!-- Images -->
<div id="images" class="section">
    <h3>Images</h3>
    <p>No images yet</p>
</div>

<!-- Videos -->
<div id="videos" class="section">
    <h3>Videos</h3>
    <p>No videos yet</p>
</div>

<!-- Comments -->
<div id="comments" class="section">
    <h3>Comments</h3>
    <p>No comments yet</p>
</div>

</body>
</html>
