<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mods - Iliya</title>

<style>
body {
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
}

input {
    padding:10px;
    width:250px;
    border:none;
    border-radius:8px;
    margin-top:20px;
}

.container {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin-top:40px;
}

.card {
    background:#1e1e1e;
    width:260px;
    padding:15px;
    border-radius:12px;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
    box-shadow:0 0 20px lime;
}

a {
    display:inline-block;
    margin-top:10px;
    padding:8px 12px;
    background:green;
    color:white;
    text-decoration:none;
    border-radius:6px;
}
</style>

<script>
function searchMods() {
    let val = document.getElementById("search").value.toLowerCase();

    let cards = document.getElementsByClassName("card");

    for(let i=0;i<cards.length;i++){
        let text = cards[i].innerText.toLowerCase();
        if(text.includes(val)){
            cards[i].style.display = "block";
        } else {
            cards[i].style.display = "none";
        }
    }
}
</script>

</head>

<body>

<h1>Mods</h1>

<input id="search" onkeyup="searchMods()" placeholder="Search mods...">

<div class="container">

    <div class="card">
        <h3>Iliya's AoH3 Mod</h3>
        <p>Main mod</p>
        <a href="mod-iliya.html">Download Page</a>
    </div>

    <div class="card">
        <h3>Iran Formable 2</h3>
        <p>Iran civilizations</p>
        <a href="mod-iran.html">Download Page</a>
    </div>

    <div class="card">
        <h3>Turkish Formable</h3>
        <p>Turkey expansion</p>
        <a href="mod-turk.html">Download Page</a>
    </div>

</div>

</body>
</html>
