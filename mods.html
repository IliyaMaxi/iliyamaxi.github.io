<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iliya Mods</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

.header{
    margin-top:30px;
    animation: fadeDown 0.7s ease;
}

@keyframes fadeDown{
    from{opacity:0; transform:translateY(-30px);}
    to{opacity:1; transform:translateY(0);}
}

input{
    padding:10px;
    width:250px;
    border:none;
    border-radius:8px;
    margin-top:15px;
}

.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin-top:40px;
}

.card{
    background:#1e1e1e;
    width:240px;
    padding:15px;
    border-radius:12px;

    opacity:0;
    transform:translateY(20px);
    animation: cardIn 0.6s ease forwards;
    transition:0.3s;
}

.card:nth-child(1){animation-delay:0.1s;}
.card:nth-child(2){animation-delay:0.2s;}
.card:nth-child(3){animation-delay:0.3s;}

@keyframes cardIn{
    to{opacity:1; transform:translateY(0);}
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px lime;
}

a{
    display:inline-block;
    margin-top:10px;
    padding:8px 12px;
    background:green;
    color:white;
    text-decoration:none;
    border-radius:6px;
}
</style>

<script>
function searchMods(){
    let val = document.getElementById("search").value.toLowerCase();
    let cards = document.getElementsByClassName("card");

    for(let i=0;i<cards.length;i++){
        cards[i].style.display =
            cards[i].innerText.toLowerCase().includes(val)
            ? "block"
            : "none";
    }
}
</script>

</head>

<body>

<div class="header">
    <h1>Iliya Mods</h1>
    <input id="search" onkeyup="searchMods()" placeholder="Search mods...">
</div>

<div class="container">

    <div class="card">
        <h3>Iliya's AoH3 Mod</h3>
        <a href="mod.html?mod=iliya">Open</a>
    </div>

    <div class="card">
        <h3>Iran Formable 2</h3>
        <a href="mod.html?mod=iran">Open</a>
    </div>

    <div class="card">
        <h3>Turkish Formable</h3>
        <a href="mod.html?mod=turk">Open</a>
    </div>

</div>

</body>
</html>
