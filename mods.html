<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mods - Iliya</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

/* انیمیشن ورود کل صفحه */
.header {
    animation: drop 0.9s ease;
    margin-top:30px;
}

@keyframes drop {
    from {
        opacity:0;
        transform: translateY(-50px);
    }
    to {
        opacity:1;
        transform: translateY(0);
    }
}

/* سرچ */
input {
    padding:10px;
    width:250px;
    border:none;
    border-radius:8px;
    margin-top:20px;
}

/* کارت‌ها */
.container {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin-top:40px;
}

/* انیمیشن کارت‌ها */
.card {
    background:#1e1e1e;
    width:260px;
    padding:15px;
    border-radius:12px;

    animation: fadeUp 0.8s ease;
    transition:0.3s;
}

@keyframes fadeUp {
    from {
        opacity:0;
        transform: translateY(40px);
    }
    to {
        opacity:1;
        transform: translateY(0);
    }
}

.card:hover {
    transform:scale(1.05);
    box-shadow:0 0 20px lime;
}

/* دکمه */
a {
    display:inline-block;
    margin-top:10px;
    padding:8px 12px;
    background:green;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

a:hover {
    box-shadow:0 0 15px lime;
}
</style>

<script>
function searchMods() {
    let val = document.getElementById("search").value.toLowerCase();
    let cards = document.getElementsByClassName("card");

    for(let i=0;i<cards.length;i++){
        let text = cards[i].innerText.toLowerCase();
        cards[i].style.display = text.includes(val) ? "block" : "none";
    }
}
</script>

</head>

<body>

<div class="header">
    <h1>Mods</h1>

    <input id="search" onkeyup="searchMods()" placeholder="Search mods...">
</div>

<div class="container">

    <div class="card">
        <h3>Iliya's AoH3 Mod</h3>
        <p>Main mod</p>
        <a href="mod-iliya.html">Download Page</a>
    </div>

    <div class="card">
        <h3>Iran Formable 2</h3>
        <p>Iran civilizations</p>
        <a href="mod-iran.html">Download Page</a>
    </div>

    <div class="card">
        <h3>Turkish Formable</h3>
        <p>Turkey expansion</p>
        <a href="mod-turk.html">Download Page</a>
    </div>

</div>

</body>
</html>
