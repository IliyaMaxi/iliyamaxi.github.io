<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mod Page</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

/* HEADER PANEL (مثل CurseForge) */
.topbar{
    display:flex;
    align-items:center;
    gap:20px;
    padding:15px;
    background:#141414;
    border-bottom:1px solid #2a2a2a;
    position:sticky;
    top:0;
}

.icon{
    width:70px;
    height:70px;
    background:#222;
    border-radius:10px;
}

.info h2{margin:0;}

.stats{
    margin-left:auto;
    display:flex;
    gap:20px;
    font-size:14px;
}

/* BUTTONS */
.download{
    padding:10px 16px;
    background:#2ecc71;
    color:black;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

/* LIKE SYSTEM */
.likeBox{
    display:flex;
    gap:10px;
    align-items:center;
}

.btn{
    cursor:pointer;
    font-size:18px;
    user-select:none;
}

.active{
    color:#2ecc71;
}

/* CONTENT */
.content{
    padding:20px;
}

.tabButtons{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tabButtons div{
    padding:8px 12px;
    background:#1e1e1e;
    border-radius:6px;
    cursor:pointer;
}

.tab{
    display:none;
}

.tab.active{
    display:block;
}
</style>

<script>

let likes = 0;
let dislikes = 0;
let liked = false;
let disliked = false;
let views = 0;

function load(){
    views++;
    document.getElementById("views").innerText = views;
    document.getElementById("likes").innerText = likes;
    document.getElementById("dislikes").innerText = dislikes;
}

function like(){
    if(liked){
        likes--;
        liked=false;
    }else{
        likes++;
        liked=true;
        if(disliked){dislikes--;disliked=false;}
    }
    load();
}

function dislike(){
    if(disliked){
        dislikes--;
        disliked=false;
    }else{
        dislikes++;
        disliked=true;
        if(liked){likes--;liked=false;}
    }
    load();
}

function showTab(id){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

window.onload = load;
</script>

</head>

<body>

<!-- TOP PANEL -->
<div class="topbar">

<div class="icon"></div>

<div class="info">
<h2 id="name">Mod Name</h2>
<a class="download" href="files/mod.zip">Download</a>
</div>

<div class="likeBox">
<div class="btn" onclick="like()">👍</div>
<span id="likes">0</span>

<div class="btn" onclick="dislike()">👎</div>
<span id="dislikes">0</span>
</div>

<div class="stats">
<div>👁 <span id="views">0</span></div>
</div>

</div>

<!-- TABS (جدا از header طبق خواسته تو) -->
<div class="content">

<div class="tabButtons">
<div onclick="showTab('about')">About</div>
<div onclick="showTab('images')">Images</div>
<div onclick="showTab('comments')">Comments</div>
</div>

<div id="about" class="tab active">
<h3>About Mod</h3>
<p>This is a custom AoH3 mod with new systems, nations and improvements.</p>
<img src="https://via.placeholder.com/400x200">
</div>

<div id="images" class="tab">
<p>No images yet</p>
</div>

<div id="comments" class="tab">
<p>No comments yet</p>
</div>

</div>

</body>
</html>
